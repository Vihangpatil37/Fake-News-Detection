<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector | Premium</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container my-5 w-100">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-shield-halved text-primary fs-1 mb-3"></i>
                        <h2 class="fw-bold text-dark">TruthGuard</h2>
                        <p class="text-muted">Advanced AI Fake News Detection</p>
                    </div>
                    
                    {% if error %}
                        <div class="alert alert-danger shadow-sm rounded-3 border-0 border-start border-danger border-4">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
                        </div>
                    {% endif %}
                    
                    <form action="/predict" method="POST">
                        <div class="mb-4">
                            <label for="news_text" class="form-label fw-bold text-secondary">
                                <i class="fa-regular fa-file-lines me-2"></i>Paste Article or Headline
                            </label>
                            <textarea class="form-control rounded-4 shadow-sm" id="news_text" name="news_text" rows="6" placeholder="Enter the news text you want to verify here..." required></textarea>
                        </div>
                        
                        <div class="mb-4 bg-light p-3 rounded-4 shadow-sm border">
                            <label class="form-label fw-bold text-secondary mb-3">
                                <i class="fa-solid fa-microchip me-2"></i>Select Detection Engine
                            </label>
                            <div class="form-check custom-radio mb-3">
                                <input class="form-check-input" type="radio" name="model_choice" id="svm" value="svm" checked>
                                <label class="form-check-label" for="svm">
                                    <strong>Support Vector Machine</strong> <span class="badge bg-success ms-2">Recommended</span>
                                    <div class="text-muted small">Fast & highly accurate for text structures</div>
                                </label>
                            </div>
                            <div class="form-check custom-radio">
                                <input class="form-check-input" type="radio" name="model_choice" id="rf" value="rf">
                                <label class="form-check-label" for="rf">
                                    <strong>Random Forest</strong>
                                    <div class="text-muted small">Robust ensemble learning algorithm</div>
                                </label>
                            </div>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-premium btn-lg">
                                <i class="fa-solid fa-bolt me-2"></i> Analyze Authenticity
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS included for completeness -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
