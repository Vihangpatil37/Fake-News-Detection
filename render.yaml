services:
  - type: web
    name: fake-news-detector
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Adjust if needed
      - key: GNEWS_API_KEY
        sync: false # User will set this manually in Render dashboard

